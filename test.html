<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Les Bleus Test</title><link rel="stylesheet" href="style.css"></head><body><main style="margin:32px auto"><section class="card"><h1>Site test</h1><p id="status">Running checks...</p><ul id="checks"></ul><p><a href="index.html">Open homepage</a></p></section></main><script src="config.js"></script><script src="quiz-data.js"></script><script src="content-data.js"></script><script>const checks=[];function ok(name,value){checks.push(`<li>${value?'✅':'❌'} ${name}</li>`)}ok('Config loaded',!!window.SITE_CONFIG);ok('Quiz data loaded',Array.isArray(window.FRANCE_QUIZ)&&window.FRANCE_QUIZ.length>=3);ok('Content data loaded',!!window.FRANCE_CONTENT&&Array.isArray(window.FRANCE_CONTENT.facts));ok('Quiz has 200 questions',Array.isArray(window.FRANCE_QUIZ)&&window.FRANCE_QUIZ.length===200);document.getElementById('checks').innerHTML=checks.join('');document.getElementById('status').textContent=checks.every(x=>x.includes('✅'))?'All basic checks passed.':'One or more checks failed.';</script></body></html>
